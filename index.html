<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aircraft Tracker</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Aircraft Tracker</h1>
      <p class="subtitle">Live aircraft map prototype</p>
    </div>
    <div class="status-box">
      <div><strong>Total Aircraft:</strong> <span id="aircraft-count">0</span></div>
      <div><strong>Last Refresh:</strong> <span id="last-refresh">--</span></div>
      <button id="refresh-button" type="button">
  Refresh Aircraft
</button>
    </div>
  </header>
<div class="filter-controls">
  <label for="callsign-filter">Filter by call sign:</label>

  <input
    id="callsign-filter"
    type="text"
    placeholder="Example: DAL"
  >

  <button id="apply-filter-button" type="button">
    Apply Filter
  </button>

  <button id="clear-filter-button" type="button">
    Clear Filters
  </button>
</div>

  <main class="layout">
    <aside class="sidebar">
      <h2>Selected Aircraft</h2>
      <div id="aircraft-details">
        <p>Click a marker on the map to view details.</p>
      </div>
    </aside>

    <section class="map-section">
      <div id="map"></div>
    </section>
  </main>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="app.js"></script>
</body>
</html>
